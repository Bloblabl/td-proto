name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# один деплой за раз; новый push отменяет незавершённый предыдущий
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      # гейт: детерминизм симуляции и работоспособность механик
      - name: Smoke (headless-симуляция)
        run: npm run smoke

      # build = tsc --noEmit + vite build, поэтому типы проверяются здесь же.
      # VITE_API_BASE (repo variable) вшивается в билд → фронт ходит на VPS-бэкенд.
      # Если переменная не задана — сборка идёт с относительным /api (гостевой прод).
      - name: Build
        run: npm run build
        env:
          VITE_API_BASE: ${{ vars.VITE_API_BASE }}

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
